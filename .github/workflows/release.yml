name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.3.0)'
        required: true
        default: 'v0.3.0'

jobs:
  changelog:
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Generate Changelog
      id: changelog
      uses: mikepenz/release-changelog-builder-action@v4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        configuration: |
          {
            "categories": [
              {
                "title": "## 🚀 Features",
                "labels": ["feature", "enhancement", "feat"]
              },
              {
                "title": "## 🐛 Bug Fixes",
                "labels": ["fix", "bug", "bugfix"]
              },
              {
                "title": "## 🔒 Security",
                "labels": ["security"]
              },
              {
                "title": "## 📝 Documentation",
                "labels": ["docs", "documentation"]
              },
              {
                "title": "## 🧪 Tests",
                "labels": ["test", "tests"]
              },
              {
                "title": "## 🔧 Maintenance",
                "labels": ["chore", "maintenance", "refactor"]
              },
              {
                "title": "## 📦 Dependencies",
                "labels": ["dependencies", "deps"]
              },
              {
                "title": "## Other Changes",
                "labels": []
              }
            ],
            "ignore_labels": ["ignore", "skip-changelog"],
            "sort": {
              "order": "ASC",
              "on_property": "mergedAt"
            },
            "label_extractor": [
              {
                "pattern": "^(feat|feature):",
                "target": "feature"
              },
              {
                "pattern": "^(fix|bug):",
                "target": "fix"
              },
              {
                "pattern": "^(docs|doc):",
                "target": "docs"
              },
              {
                "pattern": "^(test|tests):",
                "target": "test"
              },
              {
                "pattern": "^(chore|maintenance):",
                "target": "chore"
              },
              {
                "pattern": "^(deps|dependencies):",
                "target": "dependencies"
              },
              {
                "pattern": "^security:",
                "target": "security"
              }
            ],
            "template": "## Changes\n\n${{ changes }}\n\n<details>\n<summary>Uncategorized</summary>\n\n${{ uncategorized }}\n\n</details>"
          }

  release:
    runs-on: ubuntu-latest
    needs: changelog
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Get Version
      id: get_version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
        else
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
        fi

    - name: Build and Package
      run: |
        mkdir -p dist

        # Build Server (Linux AMD64)
        GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X github.com/Locon213/Mimic-Protocol/pkg/version.Version=$VERSION" -o dist/mimic-server-linux-amd64 ./cmd/server

        # Build Server (Linux ARM64)
        GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X github.com/Locon213/Mimic-Protocol/pkg/version.Version=$VERSION" -o dist/mimic-server-linux-arm64 ./cmd/server

        # Build Client (Linux AMD64)
        GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X github.com/Locon213/Mimic-Protocol/pkg/version.Version=$VERSION" -o dist/mimic-client-linux-amd64 ./cmd/client

        # Build Client (Windows AMD64)
        GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X github.com/Locon213/Mimic-Protocol/pkg/version.Version=$VERSION" -o dist/mimic-client-windows-amd64.exe ./cmd/client

        # Build Server (Windows AMD64)
        GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X github.com/Locon213/Mimic-Protocol/pkg/version.Version=$VERSION" -o dist/mimic-server-windows-amd64.exe ./cmd/server

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.VERSION }}
        name: Release ${{ env.VERSION }}
        body: |
          ${{ needs.changelog.outputs.changelog }}
          
          ---
          
          ### 📦 Installation
          
          #### Linux (AMD64)
          ```bash
          chmod +x mimic-server-linux-amd64
          ./mimic-server-linux-amd64 -config server.yaml
          ```
          
          #### Linux (ARM64)
          ```bash
          chmod +x mimic-server-linux-arm64
          ./mimic-server-linux-arm64 -config server.yaml
          ```
          
          #### Windows
          ```powershell
          .\mimic-server-windows-amd64.exe -config server.yaml
          ```
          
          ### 📝 Changelog
          
          See full changelog: [${{ env.VERSION }}](https://github.com/Locon213/Mimic-Protocol/compare/previous-tag...${{ env.VERSION }})
        draft: false
        prerelease: false
        files: |
          dist/mimic-server-linux-amd64
          dist/mimic-server-linux-arm64
          dist/mimic-client-linux-amd64
          dist/mimic-client-windows-amd64.exe
          dist/mimic-server-windows-amd64.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
