name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.3.0)'
        required: true
        default: 'v0.3.0'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        
    - name: Get Version
      id: get_version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
        else
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
        fi

    - name: Build and Package
      run: |
        mkdir -p dist
        
        # Build Server (Linux AMD64)
        GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X github.com/Locon213/Mimic-Protocol/pkg/version.Version=$VERSION" -o dist/mimic-server-linux-amd64 ./cmd/server
        
        # Build Server (Linux ARM64)
        GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X github.com/Locon213/Mimic-Protocol/pkg/version.Version=$VERSION" -o dist/mimic-server-linux-arm64 ./cmd/server
        
        # Build Client (Linux AMD64)
        GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X github.com/Locon213/Mimic-Protocol/pkg/version.Version=$VERSION" -o dist/mimic-client-linux-amd64 ./cmd/client
        
        # Build Client (Windows AMD64)
        GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X github.com/Locon213/Mimic-Protocol/pkg/version.Version=$VERSION" -o dist/mimic-client-windows-amd64.exe ./cmd/client

        # Build Server (Windows AMD64)
        GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X github.com/Locon213/Mimic-Protocol/pkg/version.Version=$VERSION" -o dist/mimic-server-windows-amd64.exe ./cmd/server

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.VERSION }}
        name: Release ${{ env.VERSION }}
        draft: false
        prerelease: false
        files: |
          dist/mimic-server-linux-amd64
          dist/mimic-server-linux-arm64
          dist/mimic-client-linux-amd64
          dist/mimic-client-windows-amd64.exe
          dist/mimic-server-windows-amd64.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
