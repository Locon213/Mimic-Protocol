name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Verify dependencies
      run: go mod verify

    - name: Build Server
      run: go build -v ./cmd/server

    - name: Build Client
      run: go build -v ./cmd/client
